name: Crypto Market Analysis Dashboard

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * *'  # Runs every day at 8:00 AM UTC
  workflow_dispatch:       # Allows manual trigger from GitHub UI

jobs:
  run-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run crypto analysis
        run: python crypto_analysis.py

      - name: Commit and push updated dashboard
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add crypto_analysis_dashboard.png
          git diff --staged --quiet || git commit -m "Auto-update: crypto dashboard $(date +'%Y-%m-%d')"
          git push
